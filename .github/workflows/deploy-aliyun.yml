name: Deploy to Aliyun ECS

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  APP_NAME: tone
  ECS_HOST: 47.116.4.25
  ECS_USERNAME: root
  ECS_SSH_PORT: 22
  ECS_APP_DIR: /opt/tone
  ECS_APP_PORT: 3002
  GOOGLE_CLIENT_ID: 1010309636967-11b7nr9oso4i333mmlgh44osevmpl7ru.apps.googleusercontent.com

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create release archive
        run: |
          tar \
            --exclude='./node_modules' \
            --exclude='./.nuxt' \
            --exclude='./.output' \
            --exclude='./.git' \
            --exclude='./.env' \
            --exclude='./.env.*' \
            --exclude='./dev.db' \
            --exclude='./release.tgz' \
            --exclude='./*.log' \
            -czf "$RUNNER_TEMP/release.tgz" .
          cp "$RUNNER_TEMP/release.tgz" release.tgz

      - name: Upload release archive to ECS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.ECS_HOST }}
          username: ${{ env.ECS_USERNAME }}
          key: ${{ secrets.ECS_SSH_KEY }}
          port: ${{ env.ECS_SSH_PORT }}
          source: "release.tgz"
          target: "/tmp/tone-release-${{ github.sha }}"
          rm: true
          overwrite: true

      - name: Build and restart app on ECS
        uses: appleboy/ssh-action@v1.2.0
        env:
          APP_NAME: ${{ env.APP_NAME }}
          APP_DIR: ${{ env.ECS_APP_DIR }}
          APP_PORT: ${{ env.ECS_APP_PORT }}
          PUBLIC_HOST: ${{ env.ECS_HOST }}
          RELEASE_SHA: ${{ github.sha }}
          GOOGLE_CLIENT_ID: ${{ env.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
        with:
          host: ${{ env.ECS_HOST }}
          username: ${{ env.ECS_USERNAME }}
          key: ${{ secrets.ECS_SSH_KEY }}
          port: ${{ env.ECS_SSH_PORT }}
          command_timeout: 30m
          envs: APP_NAME,APP_DIR,APP_PORT,PUBLIC_HOST,RELEASE_SHA,GOOGLE_CLIENT_ID,GOOGLE_CLIENT_SECRET
          script: |
            set -eu

            NEED_SYSTEM_DEPS=0
            for DEP_CMD in curl tar gzip find openssl python3 make; do
              if ! command -v "$DEP_CMD" >/dev/null 2>&1; then
                NEED_SYSTEM_DEPS=1
              fi
            done
            if ! command -v gcc >/dev/null 2>&1 || ! command -v g++ >/dev/null 2>&1; then
              NEED_SYSTEM_DEPS=1
            fi

            if [ "$NEED_SYSTEM_DEPS" = "1" ]; then
              if command -v apt-get >/dev/null 2>&1; then
                apt-get update
                DEBIAN_FRONTEND=noninteractive apt-get install -y \
                  ca-certificates \
                  curl \
                  tar \
                  gzip \
                  findutils \
                  openssl \
                  python3 \
                  build-essential
              elif command -v yum >/dev/null 2>&1; then
                yum install -y \
                  ca-certificates \
                  curl \
                  tar \
                  gzip \
                  findutils \
                  openssl \
                  python3 \
                  make \
                  gcc-c++
              else
                echo "No supported package manager found."
                exit 1
              fi
            fi

            if ! command -v npm >/dev/null 2>&1; then
              if command -v apt-get >/dev/null 2>&1; then
                curl -fsSL https://deb.nodesource.com/setup_22.x | bash -
                DEBIAN_FRONTEND=noninteractive apt-get install -y nodejs
              else
                curl -fsSL https://rpm.nodesource.com/setup_22.x | bash -
                yum install -y nodejs
              fi
            fi

            if ! command -v pm2 >/dev/null 2>&1; then
              npm install -g pm2
            fi

            if command -v caddy >/dev/null 2>&1; then
              mkdir -p /etc/caddy/conf.d
              {
                printf 'http://%s {\n' "$PUBLIC_HOST"
                printf '%s\n' '  encode gzip'
                printf '  reverse_proxy 127.0.0.1:%s\n' "$APP_PORT"
                printf '%s\n' '}'
              } > /etc/caddy/conf.d/tone.caddy

              touch /etc/caddy/Caddyfile
              if ! grep -q 'import /etc/caddy/conf.d/\*.caddy' /etc/caddy/Caddyfile; then
                printf '\nimport /etc/caddy/conf.d/*.caddy\n' >> /etc/caddy/Caddyfile
              fi

              caddy fmt --overwrite /etc/caddy/Caddyfile
              caddy fmt --overwrite /etc/caddy/conf.d/tone.caddy
              if command -v systemctl >/dev/null 2>&1; then
                systemctl reload caddy || systemctl restart caddy
              else
                caddy reload --config /etc/caddy/Caddyfile
              fi
            fi

            RELEASE_DIR="$APP_DIR/releases/$RELEASE_SHA"
            DATA_DIR="$APP_DIR/shared/data"
            NPM_CACHE_DIR="$APP_DIR/shared/npm-cache"
            NODE_MODULES_DIR="$APP_DIR/shared/node_modules"
            DATABASE_URL="file:$DATA_DIR/prod.db"

            mkdir -p "$DATA_DIR"
            mkdir -p "$NPM_CACHE_DIR"
            mkdir -p "$NODE_MODULES_DIR"
            rm -rf "$RELEASE_DIR"
            mkdir -p "$RELEASE_DIR"
            tar -xzf "/tmp/tone-release-$RELEASE_SHA/release.tgz" -C "$RELEASE_DIR"
            cd "$RELEASE_DIR"
            ln -sfn "$NODE_MODULES_DIR" node_modules

            cat > .env <<ENVFILE
            DATABASE_URL="$DATABASE_URL"
            GOOGLE_CLIENT_ID="$GOOGLE_CLIENT_ID"
            GOOGLE_CLIENT_SECRET="$GOOGLE_CLIENT_SECRET"
            ENVFILE

            npm install --cache "$NPM_CACHE_DIR" --prefer-offline --no-audit --no-fund
            npx prisma generate
            npx prisma db push
            npm run build

            export NODE_ENV=production
            export HOST=127.0.0.1
            export PORT="$APP_PORT"
            export DATABASE_URL="$DATABASE_URL"
            export GOOGLE_CLIENT_ID="$GOOGLE_CLIENT_ID"
            export GOOGLE_CLIENT_SECRET="$GOOGLE_CLIENT_SECRET"

            ln -sfn "$RELEASE_DIR" "$APP_DIR/current"
            pm2 delete "$APP_NAME" >/dev/null 2>&1 || true
            pm2 start "$RELEASE_DIR/.output/server/index.mjs" --name "$APP_NAME" --time
            pm2 save

            find "$APP_DIR/releases" -mindepth 1 -maxdepth 1 -type d | sort | head -n -5 | xargs -r rm -rf
