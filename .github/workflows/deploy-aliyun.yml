name: Deploy to Aliyun ECS

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  APP_NAME: tone
  ECS_HOST: 47.116.4.25
  ECS_USERNAME: root
  ECS_SSH_PORT: 22
  ECS_APP_DIR: /opt/tone
  ECS_APP_PORT: 3002
  PUBLIC_HOST: tone.cyberlab.bond

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Build app
        run: |
          npx prisma generate
          rm -rf .nuxt .output
          npm run build

      - name: Create release archive
        run: |
          tar \
            -czf "$RUNNER_TEMP/release.tgz" \
            .output
          cp "$RUNNER_TEMP/release.tgz" release.tgz

      - name: Upload release archive to ECS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.ECS_HOST }}
          username: ${{ env.ECS_USERNAME }}
          key: ${{ secrets.ECS_SSH_KEY }}
          port: ${{ env.ECS_SSH_PORT }}
          source: "release.tgz"
          target: "/tmp/tone-release-${{ github.sha }}"
          rm: true
          overwrite: true

      - name: Restart app on ECS
        uses: appleboy/ssh-action@v1.2.0
        env:
          APP_NAME: ${{ env.APP_NAME }}
          APP_DIR: ${{ env.ECS_APP_DIR }}
          APP_PORT: ${{ env.ECS_APP_PORT }}
          PUBLIC_HOST: ${{ env.PUBLIC_HOST }}
          RELEASE_SHA: ${{ github.sha }}
        with:
          host: ${{ env.ECS_HOST }}
          username: ${{ env.ECS_USERNAME }}
          key: ${{ secrets.ECS_SSH_KEY }}
          port: ${{ env.ECS_SSH_PORT }}
          command_timeout: 10m
          envs: APP_NAME,APP_DIR,APP_PORT,PUBLIC_HOST,RELEASE_SHA
          script: |
            set -eu

            NEED_SYSTEM_DEPS=0
            for DEP_CMD in curl tar gzip find openssl; do
              if ! command -v "$DEP_CMD" >/dev/null 2>&1; then
                NEED_SYSTEM_DEPS=1
              fi
            done

            if [ "$NEED_SYSTEM_DEPS" = "1" ]; then
              if command -v apt-get >/dev/null 2>&1; then
                apt-get update
                DEBIAN_FRONTEND=noninteractive apt-get install -y \
                  ca-certificates \
                  curl \
                  tar \
                  gzip \
                  findutils \
                  openssl
              elif command -v yum >/dev/null 2>&1; then
                yum install -y \
                  ca-certificates \
                  curl \
                  tar \
                  gzip \
                  findutils \
                  openssl
              else
                echo "No supported package manager found."
                exit 1
              fi
            fi

            if ! command -v npm >/dev/null 2>&1; then
              if command -v apt-get >/dev/null 2>&1; then
                curl -fsSL https://deb.nodesource.com/setup_22.x | bash -
                DEBIAN_FRONTEND=noninteractive apt-get install -y nodejs
              else
                curl -fsSL https://rpm.nodesource.com/setup_22.x | bash -
                yum install -y nodejs
              fi
            fi

            if ! command -v pm2 >/dev/null 2>&1; then
              npm install -g pm2
            fi

            if command -v docker >/dev/null 2>&1 && docker ps --format '{{.Names}}' | grep -qx 'caddy-gateway'; then
              CADDYFILE=/root/Caddyfile
              CADDY_BACKUP="/root/Caddyfile.before-tone-$(date +%Y%m%d%H%M%S)"
              if [ -f "$CADDYFILE" ]; then
                cp "$CADDYFILE" "$CADDY_BACKUP"
              fi

              {
                printf '%s\n' 'cyberlab.bond {'
                printf '%s\n' '    encode gzip zstd'
                printf '%s\n' ''
                printf '%s\n' '    handle /api/* {'
                printf '%s\n' '        reverse_proxy backend-server:8000'
                printf '%s\n' '    }'
                printf '%s\n' ''
                printf '%s\n' '    handle {'
                printf '%s\n' '        root * /srv'
                printf '%s\n' '        try_files {path} /index.html'
                printf '%s\n' '        file_server'
                printf '%s\n' '    }'
                printf '%s\n' '}'
                printf '%s\n' ''
                printf '%s {\n' "$PUBLIC_HOST"
                printf '%s\n' '    encode gzip zstd'
                printf '%s\n' ''
                printf '    reverse_proxy 172.17.0.1:%s\n' "$APP_PORT"
                printf '%s\n' '}'
              } > "$CADDYFILE"

              docker exec caddy-gateway caddy fmt --overwrite /etc/caddy/Caddyfile
              docker exec caddy-gateway caddy validate --config /etc/caddy/Caddyfile
              docker exec caddy-gateway caddy reload --config /etc/caddy/Caddyfile
            fi

            RELEASE_DIR="$APP_DIR/releases/$RELEASE_SHA"
            DATA_DIR="$APP_DIR/shared/data"
            DATABASE_URL="file:$DATA_DIR/prod.db"

            mkdir -p "$DATA_DIR"
            rm -rf "$RELEASE_DIR"
            mkdir -p "$RELEASE_DIR"
            tar -xzf "/tmp/tone-release-$RELEASE_SHA/release.tgz" -C "$RELEASE_DIR"
            cd "$RELEASE_DIR"

            cat > .env <<ENVFILE
            DATABASE_URL="$DATABASE_URL"
            ENVFILE

            export DATABASE_URL
            node --input-type=module <<'NODE'
            const { createRequire } = await import('node:module')
            const path = await import('node:path')
            const fs = await import('node:fs')

            const databaseUrl = process.env.DATABASE_URL || ''
            const databasePath = databaseUrl.startsWith('file:') ? databaseUrl.slice(5) : databaseUrl
            if (!databasePath) throw new Error('DATABASE_URL is required')

            fs.mkdirSync(path.dirname(databasePath), { recursive: true })
            const require = createRequire(path.join(process.cwd(), '.output/server/index.mjs'))
            const Database = require('better-sqlite3')
            const db = new Database(databasePath)

            const hasTable = (name) => Boolean(db.prepare("SELECT name FROM sqlite_master WHERE type = 'table' AND name = ?").get(name))
            const columns = (name) => hasTable(name) ? db.prepare(`PRAGMA table_info("${name}")`).all().map((column) => column.name) : []

            db.pragma('foreign_keys = OFF')
            if (hasTable('User') && !columns('User').includes('username')) {
              db.exec(`
                DROP TABLE IF EXISTS "AuthSession";
                DROP TABLE IF EXISTS "PracticeSession";
                DROP TABLE IF EXISTS "Recording";
                DROP TABLE IF EXISTS "Accompaniment";
                DROP TABLE IF EXISTS "User";
              `)
            }
            const accompanimentColumns = columns('Accompaniment')
            if (hasTable('Accompaniment') && !accompanimentColumns.includes('sortOrder')) {
              db.exec('ALTER TABLE "Accompaniment" ADD COLUMN "sortOrder" INTEGER NOT NULL DEFAULT 0')
              db.exec(`
                UPDATE "Accompaniment"
                SET "sortOrder" = (
                  SELECT COUNT(*)
                  FROM "Accompaniment" AS older
                  WHERE older."userId" IS "Accompaniment"."userId"
                    AND older."createdAt" > "Accompaniment"."createdAt"
                )
              `)
            }

            db.exec(`
              CREATE TABLE IF NOT EXISTS "User" (
                "id" INTEGER NOT NULL PRIMARY KEY AUTOINCREMENT,
                "username" TEXT NOT NULL,
                "passwordHash" TEXT NOT NULL,
                "name" TEXT NOT NULL,
                "createdAt" DATETIME NOT NULL DEFAULT CURRENT_TIMESTAMP,
                "updatedAt" DATETIME NOT NULL DEFAULT CURRENT_TIMESTAMP
              );
              CREATE UNIQUE INDEX IF NOT EXISTS "User_username_key" ON "User"("username");

              CREATE TABLE IF NOT EXISTS "Accompaniment" (
                "id" INTEGER NOT NULL PRIMARY KEY AUTOINCREMENT,
                "name" TEXT NOT NULL,
                "mimeType" TEXT NOT NULL,
                "duration" REAL NOT NULL DEFAULT 0,
                "audio" BLOB NOT NULL,
                "size" INTEGER NOT NULL,
                "sortOrder" INTEGER NOT NULL DEFAULT 0,
                "userId" INTEGER,
                "createdAt" DATETIME NOT NULL DEFAULT CURRENT_TIMESTAMP,
                "updatedAt" DATETIME NOT NULL DEFAULT CURRENT_TIMESTAMP,
                CONSTRAINT "Accompaniment_userId_fkey" FOREIGN KEY ("userId") REFERENCES "User" ("id") ON DELETE SET NULL ON UPDATE CASCADE
              );

              CREATE TABLE IF NOT EXISTS "Recording" (
                "id" INTEGER NOT NULL PRIMARY KEY AUTOINCREMENT,
                "name" TEXT NOT NULL,
                "mimeType" TEXT NOT NULL,
                "duration" REAL NOT NULL,
                "audio" BLOB NOT NULL,
                "size" INTEGER NOT NULL,
                "userId" INTEGER,
                "accompanimentId" INTEGER,
                "createdAt" DATETIME NOT NULL DEFAULT CURRENT_TIMESTAMP,
                "updatedAt" DATETIME NOT NULL DEFAULT CURRENT_TIMESTAMP,
                CONSTRAINT "Recording_userId_fkey" FOREIGN KEY ("userId") REFERENCES "User" ("id") ON DELETE SET NULL ON UPDATE CASCADE,
                CONSTRAINT "Recording_accompanimentId_fkey" FOREIGN KEY ("accompanimentId") REFERENCES "Accompaniment" ("id") ON DELETE SET NULL ON UPDATE CASCADE
              );

              CREATE TABLE IF NOT EXISTS "PracticeSession" (
                "id" INTEGER NOT NULL PRIMARY KEY AUTOINCREMENT,
                "mode" TEXT NOT NULL,
                "duration" REAL NOT NULL DEFAULT 0,
                "userId" INTEGER NOT NULL,
                "accompanimentId" INTEGER,
                "startedAt" DATETIME NOT NULL DEFAULT CURRENT_TIMESTAMP,
                "endedAt" DATETIME,
                "createdAt" DATETIME NOT NULL DEFAULT CURRENT_TIMESTAMP,
                "updatedAt" DATETIME NOT NULL DEFAULT CURRENT_TIMESTAMP,
                CONSTRAINT "PracticeSession_userId_fkey" FOREIGN KEY ("userId") REFERENCES "User" ("id") ON DELETE CASCADE ON UPDATE CASCADE,
                CONSTRAINT "PracticeSession_accompanimentId_fkey" FOREIGN KEY ("accompanimentId") REFERENCES "Accompaniment" ("id") ON DELETE SET NULL ON UPDATE CASCADE
              );
              CREATE INDEX IF NOT EXISTS "PracticeSession_userId_startedAt_idx" ON "PracticeSession"("userId", "startedAt");

              CREATE TABLE IF NOT EXISTS "AuthSession" (
                "id" INTEGER NOT NULL PRIMARY KEY AUTOINCREMENT,
                "tokenHash" TEXT NOT NULL,
                "userId" INTEGER NOT NULL,
                "expiresAt" DATETIME NOT NULL,
                "createdAt" DATETIME NOT NULL DEFAULT CURRENT_TIMESTAMP,
                CONSTRAINT "AuthSession_userId_fkey" FOREIGN KEY ("userId") REFERENCES "User" ("id") ON DELETE CASCADE ON UPDATE CASCADE
              );
              CREATE UNIQUE INDEX IF NOT EXISTS "AuthSession_tokenHash_key" ON "AuthSession"("tokenHash");
            `)
            db.pragma('foreign_keys = ON')
            db.close()
            NODE

            export NODE_ENV=production
            export HOST=0.0.0.0
            export PORT="$APP_PORT"
            export DATABASE_URL="$DATABASE_URL"

            ln -sfn "$RELEASE_DIR" "$APP_DIR/current"
            pm2 delete "$APP_NAME" >/dev/null 2>&1 || true
            pm2 start "$RELEASE_DIR/.output/server/index.mjs" --name "$APP_NAME" --time
            pm2 save || true

            curl -fsSI "https://$PUBLIC_HOST/" | tee /tmp/tone-deploy-check.txt
            if grep -q ' 502 ' /tmp/tone-deploy-check.txt; then
              echo "TONE route is still returning 502."
              if command -v caddy >/dev/null 2>&1; then
                echo "----- /etc/caddy/Caddyfile -----"
                cat /etc/caddy/Caddyfile
              fi
              pm2 status || true
              exit 1
            fi
