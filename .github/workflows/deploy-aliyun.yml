name: Deploy to Aliyun ECS

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  APP_NAME: tone
  ECS_HOST: 47.116.4.25
  ECS_USERNAME: root
  ECS_SSH_PORT: 22
  ECS_APP_DIR: /opt/tone
  ECS_APP_PORT: 3002
  PUBLIC_HOST: cyberlab.bond
  GOOGLE_CLIENT_ID: 1010309636967-11b7nr9oso4i333mmlgh44osevmpl7ru.apps.googleusercontent.com

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create release archive
        run: |
          tar \
            --exclude='./node_modules' \
            --exclude='./.nuxt' \
            --exclude='./.output' \
            --exclude='./.git' \
            --exclude='./.env' \
            --exclude='./.env.*' \
            --exclude='./dev.db' \
            --exclude='./release.tgz' \
            --exclude='./*.log' \
            -czf "$RUNNER_TEMP/release.tgz" .
          cp "$RUNNER_TEMP/release.tgz" release.tgz

      - name: Upload release archive to ECS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.ECS_HOST }}
          username: ${{ env.ECS_USERNAME }}
          key: ${{ secrets.ECS_SSH_KEY }}
          port: ${{ env.ECS_SSH_PORT }}
          source: "release.tgz"
          target: "/tmp/tone-release-${{ github.sha }}"
          rm: true
          overwrite: true

      - name: Build and restart app on ECS
        uses: appleboy/ssh-action@v1.2.0
        env:
          APP_NAME: ${{ env.APP_NAME }}
          APP_DIR: ${{ env.ECS_APP_DIR }}
          APP_PORT: ${{ env.ECS_APP_PORT }}
          PUBLIC_HOST: ${{ env.PUBLIC_HOST }}
          RELEASE_SHA: ${{ github.sha }}
          GOOGLE_CLIENT_ID: ${{ env.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
        with:
          host: ${{ env.ECS_HOST }}
          username: ${{ env.ECS_USERNAME }}
          key: ${{ secrets.ECS_SSH_KEY }}
          port: ${{ env.ECS_SSH_PORT }}
          command_timeout: 30m
          envs: APP_NAME,APP_DIR,APP_PORT,PUBLIC_HOST,RELEASE_SHA,GOOGLE_CLIENT_ID,GOOGLE_CLIENT_SECRET
          script: |
            set -eu

            NEED_SYSTEM_DEPS=0
            for DEP_CMD in curl tar gzip find openssl python3 make; do
              if ! command -v "$DEP_CMD" >/dev/null 2>&1; then
                NEED_SYSTEM_DEPS=1
              fi
            done
            if ! command -v gcc >/dev/null 2>&1 || ! command -v g++ >/dev/null 2>&1; then
              NEED_SYSTEM_DEPS=1
            fi

            if [ "$NEED_SYSTEM_DEPS" = "1" ]; then
              if command -v apt-get >/dev/null 2>&1; then
                apt-get update
                DEBIAN_FRONTEND=noninteractive apt-get install -y \
                  ca-certificates \
                  curl \
                  tar \
                  gzip \
                  findutils \
                  openssl \
                  python3 \
                  build-essential
              elif command -v yum >/dev/null 2>&1; then
                yum install -y \
                  ca-certificates \
                  curl \
                  tar \
                  gzip \
                  findutils \
                  openssl \
                  python3 \
                  make \
                  gcc-c++
              else
                echo "No supported package manager found."
                exit 1
              fi
            fi

            if ! command -v npm >/dev/null 2>&1; then
              if command -v apt-get >/dev/null 2>&1; then
                curl -fsSL https://deb.nodesource.com/setup_22.x | bash -
                DEBIAN_FRONTEND=noninteractive apt-get install -y nodejs
              else
                curl -fsSL https://rpm.nodesource.com/setup_22.x | bash -
                yum install -y nodejs
              fi
            fi

            if ! command -v pm2 >/dev/null 2>&1; then
              npm install -g pm2
            fi

            if command -v caddy >/dev/null 2>&1; then
              CADDYFILE=/etc/caddy/Caddyfile
              CADDY_BACKUP=/etc/caddy/Caddyfile.before-tone
              TONE_ROUTES=/tmp/tone-caddy-routes

              {
                printf '%s\n' '  # tone-start'
                printf '%s\n' '  @tone path /tone* /_nuxt/* /api/* /manifest.webmanifest /sw.js /icons/*'
                printf '%s\n' '  handle @tone {'
                printf '    reverse_proxy 127.0.0.1:%s\n' "$APP_PORT"
                printf '%s\n' '  }'
                printf '%s\n' '  # tone-end'
              } > "$TONE_ROUTES"

              if [ -f "$CADDYFILE" ] && [ ! -f "$CADDY_BACKUP" ]; then
                cp "$CADDYFILE" "$CADDY_BACKUP"
              fi
              touch "$CADDYFILE"
              rm -f /etc/caddy/conf.d/tone.caddy

              awk '
                /# tone-start/ {
                  skip = 1
                  next
                }
                /# tone-end/ {
                  skip = 0
                  next
                }
                !skip {
                  print
                }
              ' "$CADDYFILE" > "$CADDYFILE.clean"

              awk -v host="$PUBLIC_HOST" -v routes="$TONE_ROUTES" '
                function print_routes(line) {
                  while ((getline line < routes) > 0) {
                    print line
                  }
                  close(routes)
                  inserted = 1
                }
                {
                  print
                  if (!inserted && $0 ~ host && $0 ~ /\{/) {
                    print_routes()
                  }
                }
                END {
                  if (!inserted) {
                    print ""
                    print host " {"
                    print_routes()
                    print "}"
                  }
                }
              ' "$CADDYFILE.clean" > "$CADDYFILE"
              rm -f "$CADDYFILE.clean" "$TONE_ROUTES"

              caddy fmt --overwrite "$CADDYFILE"
              caddy validate --config "$CADDYFILE"
              if command -v systemctl >/dev/null 2>&1; then
                systemctl reload caddy || systemctl restart caddy
              else
                caddy reload --config "$CADDYFILE"
              fi
            fi

            RELEASE_DIR="$APP_DIR/releases/$RELEASE_SHA"
            DATA_DIR="$APP_DIR/shared/data"
            NPM_CACHE_DIR="$APP_DIR/shared/npm-cache"
            NODE_MODULES_DIR="$APP_DIR/shared/node_modules"
            DATABASE_URL="file:$DATA_DIR/prod.db"

            mkdir -p "$DATA_DIR"
            mkdir -p "$NPM_CACHE_DIR"
            mkdir -p "$NODE_MODULES_DIR"
            rm -rf "$RELEASE_DIR"
            mkdir -p "$RELEASE_DIR"
            tar -xzf "/tmp/tone-release-$RELEASE_SHA/release.tgz" -C "$RELEASE_DIR"
            cd "$RELEASE_DIR"
            ln -sfn "$NODE_MODULES_DIR" node_modules

            cat > .env <<ENVFILE
            DATABASE_URL="$DATABASE_URL"
            GOOGLE_CLIENT_ID="$GOOGLE_CLIENT_ID"
            GOOGLE_CLIENT_SECRET="$GOOGLE_CLIENT_SECRET"
            ENVFILE

            npm install --cache "$NPM_CACHE_DIR" --prefer-offline --no-audit --no-fund
            npx prisma generate
            npx prisma db push
            npm run build

            export NODE_ENV=production
            export HOST=127.0.0.1
            export PORT="$APP_PORT"
            export DATABASE_URL="$DATABASE_URL"
            export GOOGLE_CLIENT_ID="$GOOGLE_CLIENT_ID"
            export GOOGLE_CLIENT_SECRET="$GOOGLE_CLIENT_SECRET"

            ln -sfn "$RELEASE_DIR" "$APP_DIR/current"
            pm2 delete "$APP_NAME" >/dev/null 2>&1 || true
            pm2 start "$RELEASE_DIR/.output/server/index.mjs" --name "$APP_NAME" --time
            pm2 save

            curl -fsSI "https://$PUBLIC_HOST/tone" | tee /tmp/tone-deploy-check.txt
            if grep -q ' 502 ' /tmp/tone-deploy-check.txt; then
              echo "TONE route is still returning 502."
              if command -v caddy >/dev/null 2>&1; then
                echo "----- /etc/caddy/Caddyfile -----"
                cat /etc/caddy/Caddyfile
              fi
              pm2 status || true
              exit 1
            fi

            find "$APP_DIR/releases" -mindepth 1 -maxdepth 1 -type d | sort | head -n -5 | xargs -r rm -rf
