name: Deploy to Aliyun ECS

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  APP_NAME: tone
  ECS_HOST: 47.116.4.25
  ECS_USERNAME: root
  ECS_SSH_PORT: 22
  ECS_APP_DIR: /opt/tone
  ECS_APP_PORT: 3002
  GOOGLE_CLIENT_ID: 1010309636967-11b7nr9oso4i333mmlgh44osevmpl7ru.apps.googleusercontent.com

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create release archive
        run: |
          tar \
            --exclude='./node_modules' \
            --exclude='./.nuxt' \
            --exclude='./.output' \
            --exclude='./.git' \
            --exclude='./.env' \
            --exclude='./.env.*' \
            --exclude='./dev.db' \
            --exclude='./release.tgz' \
            --exclude='./*.log' \
            -czf release.tgz .

      - name: Upload release archive to ECS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.ECS_HOST }}
          username: ${{ env.ECS_USERNAME }}
          key: ${{ secrets.ECS_SSH_KEY }}
          port: ${{ env.ECS_SSH_PORT }}
          source: "release.tgz"
          target: "/tmp/tone-release-${{ github.sha }}"
          rm: true
          overwrite: true

      - name: Build and restart app on ECS
        uses: appleboy/ssh-action@v1.2.0
        env:
          APP_NAME: ${{ env.APP_NAME }}
          APP_DIR: ${{ env.ECS_APP_DIR }}
          APP_PORT: ${{ env.ECS_APP_PORT }}
          RELEASE_SHA: ${{ github.sha }}
          GOOGLE_CLIENT_ID: ${{ env.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
        with:
          host: ${{ env.ECS_HOST }}
          username: ${{ env.ECS_USERNAME }}
          key: ${{ secrets.ECS_SSH_KEY }}
          port: ${{ env.ECS_SSH_PORT }}
          envs: APP_NAME,APP_DIR,APP_PORT,RELEASE_SHA,GOOGLE_CLIENT_ID,GOOGLE_CLIENT_SECRET
          script: |
            set -eu

            RELEASE_DIR="$APP_DIR/releases/$RELEASE_SHA"
            DATA_DIR="$APP_DIR/shared/data"
            DATABASE_URL="file:$DATA_DIR/prod.db"

            mkdir -p "$DATA_DIR"
            rm -rf "$RELEASE_DIR"
            mkdir -p "$RELEASE_DIR"
            tar -xzf "/tmp/tone-release-$RELEASE_SHA/release.tgz" -C "$RELEASE_DIR"
            cd "$RELEASE_DIR"

            cat > .env <<ENVFILE
            DATABASE_URL="$DATABASE_URL"
            GOOGLE_CLIENT_ID="$GOOGLE_CLIENT_ID"
            GOOGLE_CLIENT_SECRET="$GOOGLE_CLIENT_SECRET"
            ENVFILE

            npm ci
            npx prisma generate
            npx prisma db push
            npm run build

            if ! command -v pm2 >/dev/null 2>&1; then
              npm install -g pm2
            fi

            export NODE_ENV=production
            export HOST=127.0.0.1
            export PORT="$APP_PORT"
            export DATABASE_URL="$DATABASE_URL"
            export GOOGLE_CLIENT_ID="$GOOGLE_CLIENT_ID"
            export GOOGLE_CLIENT_SECRET="$GOOGLE_CLIENT_SECRET"

            ln -sfn "$RELEASE_DIR" "$APP_DIR/current"
            pm2 delete "$APP_NAME" >/dev/null 2>&1 || true
            pm2 start "$RELEASE_DIR/.output/server/index.mjs" --name "$APP_NAME" --time
            pm2 save

            find "$APP_DIR/releases" -mindepth 1 -maxdepth 1 -type d | sort | head -n -5 | xargs -r rm -rf
